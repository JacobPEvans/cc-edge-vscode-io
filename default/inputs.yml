inputs:
  vscode-logs:
    disabled: false
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 30
    filenames:
      - "*.log"
    filterArchivedFiles: false
    tailOnly: true
    idleTimeout: 300
    checkFileModTime: true
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: true
    type: file
    path: "$VSCODE_HOME/logs"
    metadata:
      - name: datatype
        value: "'vscode-logs'"

  vscode-settings:
    disabled: true
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 120
    filenames:
      - "*settings.json"
    filterArchivedFiles: false
    tailOnly: false
    idleTimeout: 300
    checkFileModTime: true
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: false
    type: file
    path: "$VSCODE_HOME/User"
    metadata:
      - name: datatype
        value: "'vscode-settings'"

  vscode-extensions:
    disabled: true
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 300
    filenames:
      - "*extensions.json"
    filterArchivedFiles: false
    tailOnly: false
    idleTimeout: 300
    checkFileModTime: true
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: false
    type: file
    path: "$VSCODE_EXT_HOME/.vscode"
    metadata:
      - name: datatype
        value: "'vscode-extensions'"
